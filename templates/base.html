{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Área de membros - Grupo Enriquecedor{% endblock %}</title>

    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" type="text/css" href="https://unpkg.com/trix@2.0.8/dist/trix.css">
    <script type="text/javascript" src="https://unpkg.com/trix@2.0.8/dist/trix.umd.min.js"></script>

    <link rel="stylesheet" href="{% static 'css/theme_changer.css' %}">
    <link rel="stylesheet" href="{% static 'css/liquid-base.css' %}">

    <link rel="shortcut icon" href="https://s3.henriquegoularte.com.br/area-membros/logo-light.png">

    <script>
        localStorage.removeItem("theme");
        document.documentElement.setAttribute("data-theme", "light");
    </script>

    <meta name="htmx-config" content='{"headers":{"X-CSRFToken":"{{ csrf_token }}"}}'>

    <style>
        trix-toolbar {
            background-color: #f3f4f6;
            padding: 0.5rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .trix-button-group {
            background-color: white !important;
            border: 1px solid #d1d5db !important;
            border-radius: 0.375rem !important;
            margin-bottom: 0 !important;
        }

        trix-editor {
            background-color: var(--fallback-b1, oklch(var(--b1)));
            color: var(--fallback-bc, oklch(var(--bc)));
        }

        [x-cloak] {
            display: none !important;
        }
    </style>

</head>

<body class="m-0 p-0 overflow-x-hidden">
    <!-- Liquid Background Layer -->
    <div class="liquid-bg">
        <div class="liquid-blob bg-[#007bff]"
            style="width: 500px; height: 500px; top: -100px; left: -100px; opacity: 0.2; animation-duration: 15s;">
        </div>
        <div class="liquid-blob bg-purple-600"
            style="width: 400px; height: 400px; top: 40%; right: -100px; opacity: 0.15; animation-duration: 20s; animation-delay: -5s;">
        </div>
        <div class="liquid-blob bg-cyan-600"
            style="width: 600px; height: 600px; bottom: -150px; left: 20%; opacity: 0.15; animation-duration: 25s; animation-delay: -10s;">
        </div>
    </div>

    <main class="container mx-auto flex-grow p-0 pt-6 relative z-10">
        {% block content %}
        {% endblock content %}
    </main>

    <footer class="liquid-footer">
        <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-start gap-12">
            <aside class="space-y-4">
                <img src="https://s3.henriquegoularte.com.br/area-membros/logo-dark.png" class="footer-logo w-24 h-auto"
                    alt="Logo">
                <p class="text-xs text-white/40 leading-relaxed max-w-xs">
                    Grupo Enriquecedor<br />
                    A única assessoria 100% na prática.
                </p>
            </aside>

            <nav>
                <h6 class="footer-title">Social</h6>
                <div class="flex gap-6">
                    <a href="https://www.instagram.com/ohenriquecedor/" class="group" title="Instagram">
                        <div
                            class="w-10 h-10 rounded-full glass-panel-base flex items-center justify-center group-hover:bg-pink-500/20 group-hover:border-pink-500/50 transition-all duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                class="fill-current text-white/60 group-hover:text-pink-500">
                                <path
                                    d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z" />
                            </svg>
                        </div>
                    </a>

                    <a href="https://www.youtube.com/channel/UCA-PsU2PUQ11KSA_GDYNugw" class="group" title="YouTube">
                        <div
                            class="w-10 h-10 rounded-full glass-panel-base flex items-center justify-center group-hover:bg-red-600/20 group-hover:border-red-600/50 transition-all duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                class="fill-current text-white/60 group-hover:text-red-600">
                                <path
                                    d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z" />
                            </svg>
                        </div>
                    </a>
                </div>
            </nav>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <script src="{% static 'js/sortable_curriculum.js' %}"></script>
    <div id="container-de-notificacoes" class="toast toast-top toast-end z-50"></div>

    <!-- Global Container for Dynamic Modals -->
    <div id="modal-dinamico-container"></div>
</body>

</html>
