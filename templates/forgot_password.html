{% extends 'base.html' %}
{% load static %}

{% block title %}Esqueci minha senha - Grupo Enriquecedor{% endblock %}

{% block content %}

<link rel="stylesheet" href="{% static 'css/login.css' %}">

<div class="login-page">

    <!-- Recovery Card (Glass Panel) -->
    <div class="glass-panel w-full max-w-md mx-4 p-10 reveal">

        <!-- Logo -->
        <div class="flex flex-col items-center mb-10">
            <img src="https://s3.henriquegoularte.com.br/area-membros/logo-dark.png"
                class="theme-img-dark w-40 h-auto mb-6" alt="Logo Grupo Enriquecedor">
            <img src="https://s3.henriquegoularte.com.br/area-membros/logo-light.png"
                class="theme-img-light w-40 h-auto mb-6" alt="Logo Grupo Enriquecedor">

            <h1 class="login-title">REDEFINIR SENHA</h1>
            <p class="login-subtitle text-center">Informe seu e-mail para redefinir sua senha</p>
        </div>

        <!-- Form -->
        <form hx-post="{% url 'forgot_password' %}" hx-target="#mensagem-forgot" hx-swap="innerHTML">
            {% csrf_token %}

            <div class="input-group">
                <input type="email" name="email" class="login-input" placeholder=" " required autocomplete="email" />
                <label>E-mail</label>
            </div>

            <button type="submit" class="btn-gradient">
                <span>ENVIAR LINK</span>
            </button>

            <div id="mensagem-forgot" style="margin-top: 1.5rem;"></div>
        </form>

        <div class="login-divider"></div>

        <div class="text-center">
            <a href="{% url 'login' %}" class="login-link">← Voltar para o login</a>
        </div>

        <p class="login-footer-text text-center font-light uppercase tracking-widest text-[10px]"
            style="margin-top: 2rem;">
            A única assessoria 100% na prática
        </p>
    </div>

    {% endblock %}
