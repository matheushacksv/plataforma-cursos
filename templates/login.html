{% extends 'base.html' %}
{% load static %}

{% block title %}Login - Grupo Enriquecedor{% endblock %}

{% block content %}

<link rel="stylesheet" href="{% static 'css/login.css' %}">

<div class="login-page">
  <!-- Login Card (Glass Panel) -->
  <div class="glass-panel w-full max-w-md mx-4 p-10 reveal">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-10">
      <img src="https://s3.henriquegoularte.com.br/area-membros/logo-dark.png" class="theme-img-dark w-40 h-auto mb-6"
        alt="Logo Grupo Enriquecedor">
      <img src="https://s3.henriquegoularte.com.br/area-membros/logo-light.png" class="theme-img-light w-40 h-auto mb-6"
        alt="Logo Grupo Enriquecedor">

      <h1 class="login-title">LOGIN</h1>
      <p class="login-subtitle text-center">Acesse sua área de membros</p>
    </div>

    <!-- Form -->
    <form hx-post="{% url 'login' %}" hx-target="#mensagem-login" hx-swap="innerHTML">
      {% csrf_token %}

      <div class="input-group">
        <input type="email" name="email" class="login-input" placeholder=" " required autocomplete="email" />
        <label>E-mail</label>
      </div>

      <div class="input-group">
        <input type="password" name="password" class="login-input" placeholder=" " required
          autocomplete="current-password" />
        <label>Senha</label>
      </div>

      <div class="flex justify-end mb-8">
        <a href="{% url 'forgot_password' %}" class="login-link">Esqueceu a senha?</a>
      </div>

      <button type="submit" class="btn-gradient">
        <span>ENTRAR NA PLATAFORMA</span>
      </button>

      <div id="mensagem-login" style="margin-top: 1.5rem;"></div>
    </form>

    <div class="login-divider"></div>

    <p class="login-footer-text text-center font-light uppercase tracking-widest text-[10px]">
      A única assessoria 100% na prática
    </p>
  </div>
</div>

{% endblock %}
