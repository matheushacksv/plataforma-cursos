<dialog x-data="{ open: true }" class="modal backdrop-blur-sm" :class="{ 'modal-open': open }"
    @keydown.window.escape="open = false" @curso-atualizado.camel.window="open = false">

    <div
        class="modal-box w-11/12 max-w-2xl glass-panel-base border border-white/10 text-white shadow-2xl relative animate-fade-in">

        <button type="button"
            class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2 text-white/50 hover:text-white"
            @click="open = false">✕</button>

        <form hx-post="{% url 'edit_course' curso.id %}" class="flex flex-col gap-5 mt-2">
            {% csrf_token %}

            <h3 class="font-heading font-bold text-xl text-white mb-2">Editar Informações do Curso</h3>

            <label class="form-control w-full">
                <div class="label"><span class="label-text font-medium text-white/80">Título do Curso</span>
                </div>
                <input type="text" name="title"
                    class="w-full px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-sm text-white focus:outline-none focus:border-[#007bff] focus:bg-white/10 transition-all placeholder-white/40"
                    value="{{ curso.title }}" required>
            </label>

            <label class="form-control w-full">
                <div class="label"><span class="label-text font-medium text-white/80">Descrição</span></div>
                <textarea name="description"
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-sm text-white focus:outline-none focus:border-[#007bff] focus:bg-white/10 transition-all placeholder-white/40 h-32">{{ curso.description }}</textarea>
            </label>

            <label class="form-control w-full">
                <div class="label"><span class="label-text font-medium text-white/80">ID do produto
                        Kiwify</span></div>
                <input type="text" name="id_kiwify"
                    class="w-full px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-sm text-white focus:outline-none focus:border-[#007bff] focus:bg-white/10 transition-all placeholder-white/40"
                    value="{{ curso.kiwify_product_id }}">
            </label>

            <label class="form-control w-full">
                <div class="label"><span class="label-text font-medium text-white/80">URL do checkout</span></div>
                <input type="url" name="checkout_url"
                    class="w-full px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-sm text-white focus:outline-none focus:border-[#007bff] focus:bg-white/10 transition-all placeholder-white/40"
                    value="{{ curso.checkout_url }}">
            </label>

            <label class="form-control w-full">
                <div class="label"><span class="label-text font-medium text-white/80">URL da página</span></div>
                <input type="url" name="page_url"
                    class="w-full px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-sm text-white focus:outline-none focus:border-[#007bff] focus:bg-white/10 transition-all placeholder-white/40"
                    value="{{ curso.page_url }}">
            </label>

            <div class="modal-action mt-6 gap-3">
                <button type="button"
                    class="btn btn-ghost hover:bg-white/10 text-white/70 hover:text-white transition-colors"
                    @click="open = false">Cancelar</button>
                <button type="submit"
                    class="btn bg-indigo-600 hover:bg-indigo-700 text-white shrink-0 px-8 py-2.5 rounded-xl h-auto min-h-0 border-0 transition-colors uppercase tracking-widest text-[10px] font-semibold h-[42px] flex items-center justify-center">Salvar
                    Alterações</button>
            </div>
        </form>
    </div>
    <div class="modal-backdrop bg-black/50" @click="open = false"></div>
</dialog>
