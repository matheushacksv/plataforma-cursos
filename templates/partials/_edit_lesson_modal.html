<div x-data="{ modalEdit: true }" @grade-atualizada.camel.window="modalEdit = false">
    <dialog class="modal backdrop-blur-sm"
            :class="{'modal-open': modalEdit}"
            @keydown.window.escape="modalEdit = false">
        
        <div class="modal-box w-11/12 max-w-4xl">
            <button type="button" class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2" @click="modalEdit = false">
                ✕
            </button>
        
            <form id="form-edit-aula" hx-post="{% url 'edit_lesson' aula.id %}" hx-encoding="multipart/form-data">
                {% csrf_token %}

                <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-full border p-6 flex flex-col gap-4 mt-4">
                    <legend class="fieldset-legend text-lg font-bold">Editar Aula</legend>

                    <label class="form-control w-full">
                        <div class="label"><span class="label-text font-medium">Título</span></div>
                        <input type="text" name="titulo" class="input input-bordered w-full" value="{{ aula.title }}" required>
                    </label>

                    <label class="form-control w-full">
                        <div class="label"><span class="label-text font-medium">Descrição</span></div>
                        <input type="text" name="descricao" class="input input-bordered w-full" value="{{ aula.description }}">
                    </label>

                    <div class="divider text-base-content/50 text-sm">Conteúdo da Aula</div>

                    <div class="form-control w-full">
                        <div class="label"><span class="label-text font-medium">URL do vídeo</span></div>
                        <input type="url" name="video_url" class="input input-bordered w-full" value="{% if aula.video_url %}{{ aula.video_url }}{% endif %}" pattern="^(https?://)?([a-zA-Z0-9]([a-zA-Z0-9\-].*[a-zA-Z0-9])?\.)+[a-zA-Z].*$" />
                    </div>

                    <div class="form-control w-full">
                        <div class="label"><span class="label-text font-medium">Conteúdo em Texto</span></div>
                        
                        <input id="edit-conteudo-aula" type="hidden" name="content" value="{{ aula.content|default_if_none:''|escape }}">
                        <trix-editor input="edit-conteudo-aula" class="textarea textarea-bordered w-full min-h-[150px] overflow-y-auto text-base"></trix-editor>
                    </div>

                    <label class="form-control w-full">
                        <div class="label"><span class="label-text font-medium">Adicionar mais Materiais (Opcional)</span></div>
                        <input type="file" name="attachments" multiple class="file-input file-input-bordered w-full" />
                    </label>
                    
                    {% if aula.materials.all %}
                    <div class="bg-base-100 p-3 rounded-lg border border-base-300 mt-2">
                        <p class="text-xs font-bold mb-2 text-base-content/70 uppercase">Arquivos Atuais:</p>
                        <ul class="text-sm space-y-1">
                            {% for mat in aula.materials.all %}
                                <li class="flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-primary"><path stroke-linecap="round" stroke-linejoin="round" d="M18.375 12.739l-7.693 7.693a4.5 4.5 0 01-6.364-6.364l10.94-10.94A3 3 0 1119.5 7.372L8.552 18.32m.009-.01l-.01.01m5.699-9.941l-7.81 7.81a1.5 1.5 0 002.112 2.13" /></svg>
                                    {{ mat.file.name|slice:"18:" }}
                                </li>
                            {% endfor %}
                        </ul>
                    </div>
                    {% endif %}

                    <div class="modal-action mt-6">
                        <button type="button" class="btn btn-ghost" @click="modalEdit = false">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                    </div>

                </fieldset>
            </form>
        </div> 
    </dialog>
</div>
