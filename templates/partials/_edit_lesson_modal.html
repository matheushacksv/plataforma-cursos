<dialog x-data="{ open: true }" class="modal backdrop-blur-sm" :class="{ 'modal-open': open }"
    @keydown.window.escape="open = false" @grade-atualizada.camel.window="open = false">

    <div
        class="modal-box w-11/12 max-w-4xl glass-panel-base border border-white/10 text-white shadow-2xl relative z-50 animate-fade-in">

        <button type="button"
            class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2 text-white/50 hover:text-white"
            @click="open = false">
            ✕
        </button>

        <form id="form-edit-aula" hx-post="{% url 'edit_lesson' aula.id %}" hx-encoding="multipart/form-data">
            {% csrf_token %}

            <fieldset
                class="fieldset bg-black/20 border-white/10 rounded-box w-full border p-6 flex flex-col gap-4 mt-4 text-white">
                <legend class="fieldset-legend font-heading text-lg font-bold text-white">Editar Aula</legend>

                <label class="form-control w-full">
                    <div class="label"><span class="label-text font-medium text-white/80">Título</span></div>
                    <input type="text" name="titulo"
                        class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-xl text-sm text-white focus:outline-none focus:border-[#007bff] focus:bg-white/10 transition-all placeholder-white/40"
                        value="{{ aula.title }}" required>
                </label>

                <label class="form-control w-full">
                    <div class="label"><span class="label-text font-medium text-white/80">Descrição</span></div>
                    <input type="text" name="descricao"
                        class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-xl text-sm text-white focus:outline-none focus:border-[#007bff] focus:bg-white/10 transition-all placeholder-white/40"
                        value="{{ aula.description }}">
                </label>

                <div class="h-px bg-white/10 my-4 flex items-center justify-center relative"><span
                        class="absolute bg-[#050a14] px-4 text-white/50 text-xs font-semibold uppercase tracking-widest">Conteúdo
                        da Aula</span></div>

                <div class="form-control w-full">
                    <div class="label"><span class="label-text font-medium text-white/80">URL do vídeo</span>
                    </div>
                    <input type="url" name="video_url"
                        class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-xl text-sm text-white focus:outline-none focus:border-[#007bff] focus:bg-white/10 transition-all placeholder-white/40"
                        value="{% if aula.video_url %}{{ aula.video_url }}{% endif %}"
                        pattern="^(https?://)?([a-zA-Z0-9]([a-zA-Z0-9\-].*[a-zA-Z0-9])?\.)+[a-zA-Z].*$" />
                </div>

                <div class="form-control w-full">
                    <div class="label"><span class="label-text font-medium text-white/80">Conteúdo em
                            Texto</span></div>

                    <input id="edit-conteudo-aula" type="hidden" name="content"
                        value="{{ aula.content|default_if_none:''|escape }}">
                    <trix-editor input="edit-conteudo-aula"
                        class="w-full min-h-[150px] overflow-y-auto text-base bg-white/5 border border-white/10 rounded-xl text-white focus:outline-none focus:border-[#007bff] focus:bg-white/10 transition-all p-4"></trix-editor>
                </div>

                <label class="form-control w-full">
                    <div class="label"><span class="label-text font-medium text-white/80">Adicionar mais
                            Materiais (Opcional)</span></div>
                    <input type="file" name="attachments" multiple
                        class="file-input border border-white/10 text-white w-full bg-white/5" />
                </label>

                {% if aula.materials.all %}
                <div class="bg-black/30 p-4 rounded-xl border border-white/10 mt-2 shadow-inner">
                    <p class="text-xs font-bold mb-3 text-white/60 uppercase tracking-widest">Arquivos Atuais:
                    </p>
                    <ul class="text-sm space-y-2">
                        {% for mat in aula.materials.all %}
                        <li class="flex items-center gap-3 text-white/80 hover:text-white transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                                stroke="currentColor" class="w-4 h-4 text-[#007bff]">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M18.375 12.739l-7.693 7.693a4.5 4.5 0 01-6.364-6.364l10.94-10.94A3 3 0 1119.5 7.372L8.552 18.32m.009-.01l-.01.01m5.699-9.941l-7.81 7.81a1.5 1.5 0 002.112 2.13" />
                            </svg>
                            {{ mat.file.name|slice:"18:" }}
                        </li>
                        {% endfor %}
                    </ul>
                </div>
                {% endif %}

                <div class="modal-action mt-6">
                    <button type="button" class="btn btn-ghost hover:bg-error/20 hover:text-error transition-colors"
                        @click="open = false">Cancelar</button>
                    <button type="submit"
                        class="btn bg-indigo-600 hover:bg-indigo-700 text-white shrink-0 whitespace-nowrap flex-nowrap px-6 py-2.5 rounded-xl h-fit w-fit transition-colors border-0">Salvar
                        Alterações</button>
                </div>

            </fieldset>
        </form>
    </div>
    <div class="modal-backdrop bg-black/50" @click="open = false"></div>
</dialog>
