<div class="container mx-auto max-w-4xl py-8" hx-get="{% url 'manage_curriculum' curso.id %}"
    hx-trigger="gradeAtualizada from:body" hx-swap="outerHTML">

    <div class="mb-2">
        <a href="{% url 'course_details' curso.id %}"
            class="btn btn-ghost btn-sm -ml-3 text-base-content/70 hover:text-base-content">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                stroke="currentColor" class="w-4 h-4 mr-1">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
            </svg>
            Voltar ao Curso
        </a>
    </div>

    <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-4">
            <h2 class="text-3xl font-bold">Organizar Grade: {{ curso.title }}</h2>
            <button hx-get="{% url 'edit_course' curso.id %}" hx-target="#modal-dinamico-container" hx-swap="innerHTML"
                class="btn btn-ghost btn-sm btn-circle text-info hover:bg-info hover:text-white transition-colors"
                title="Editar informações do curso">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                    stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125" />
                </svg>
            </button>
        </div>
        <div id="save-status" class="text-sm font-semibold text-success transition-opacity opacity-0">✅ Salvo!</div>
    </div>


    <div id="modules-list" class="space-y-6">

        {% for modulo in modulos %}
        <div class="module-item card bg-base-200 border border-base-300 shadow-sm" data-id="{{modulo.id}}">

            <div class="card-header p-4 bg-base-300 rounded-t-2xl flex items-center justify-between">

                <div class="flex items-center gap-3 cursor-move flex-1">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                        stroke="currentColor" class="w-6 h-6 text-base-content/50">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 9h16.5m-16.5 6.75h16.5" />
                    </svg>
                    <h3 class="text-xl font-bold">{{ modulo.title }}</h3>
                </div>

                <div class="flex items-center gap-1 ml-4">
                    <button hx-get="{% url 'edit_module' modulo.id %}" hx-target="#modal-dinamico-container"
                        hx-swap="innerHTML"
                        class="btn btn-ghost btn-sm btn-circle text-info hover:bg-info hover:text-white transition-colors"
                        title="Editar Módulo">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125" />
                        </svg>
                    </button>

                    <button hx-post="{% url 'delete_module' modulo.id %}"
                        hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                        hx-confirm="Tem certeza que deseja excluir o módulo '{{ modulo.title }}' e TODAS as aulas dentro dele?"
                        class="btn btn-ghost btn-sm btn-circle text-error hover:bg-error hover:text-white transition-colors"
                        title="Excluir Módulo">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="card-body p-4">
                <ul class="lessons-list space-y-2 min-h-[40px] bg-base-100 p-3 rounded-box border border-dashed border-base-300"
                    data-module-id="{{modulo.id}}">

                    {% for aula in modulo.lessons.all %}
                    <li class="lesson-item flex items-center justify-between p-3 bg-base-100 border border-base-200 rounded-lg shadow-sm hover:shadow-md transition-shadow"
                        data-id="{{aula.id}}">

                        <div class="flex items-center gap-3 cursor-move flex-1">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="w-5 h-5 text-base-content/40">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M8.25 15L12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9" />
                            </svg>
                            <span class="font-medium truncate">{{ aula.title }}</span>
                        </div>

                        <div class="flex items-center gap-1">
                            <button hx-get="{% url 'edit_lesson' aula.id %}" hx-target="#modal-dinamico-container"
                                hx-swap="innerHTML"
                                class="btn btn-ghost btn-sm btn-circle text-info hover:bg-info hover:text-white transition-colors"
                                title="Editar Aula">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125" />
                                </svg>
                            </button>

                            <button hx-post="{% url 'delete_lesson' aula.id %}"
                                hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                                hx-confirm="Tem certeza que deseja excluir a aula '{{ aula.title }}'? Esta ação não pode ser desfeita."
                                class="btn btn-ghost btn-sm btn-circle text-error hover:bg-error hover:text-white transition-colors"
                                title="Excluir Aula">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                                </svg>
                            </button>
                        </div>

                    </li>
                    {% endfor %}

                </ul>
            </div>

        </div>
        {% endfor %}
    </div>

</div>

<script>
    initSortableCurriculum(
        "{% url 'update_curriculum_order' curso.id %}",
        "{{ csrf_token }}"
    )
</script>
